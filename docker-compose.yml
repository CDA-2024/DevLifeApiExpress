services:
  mysql:
    image: mysql:latest
    container_name: devlife_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devlife_mysql
    ports:
      - "3307:3306"
    volumes:
      - mysql-db:/var/lib/mysql

  mongodb:
    image: mongo:latest
    container_name: devlife_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=devlife_mongo
    volumes:
      - mongodb-db:/data/db
      - mongodb-config:/data/configdb

volumes:
  mysql-db:
  mongodb-db:
  mongodb-config: